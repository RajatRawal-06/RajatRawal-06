<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="250" viewBox="0 0 860 250" overflow="hidden">
  <defs>
    <!-- Ferrofluid Filter -->
    <filter id="ferrofluid" filterUnits="userSpaceOnUse" x="-200" y="-200" width="1260" height="650">
      <!-- 1. Fractal Noise for organic distortion -->
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="5" result="noise" />
      
      <!-- 2. Displace the circles -->
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="60" xChannelSelector="R" yChannelSelector="G" result="distorted" />
      
      <!-- 3. Blur for Gooey effect -->
      <feGaussianBlur in="distorted" stdDeviation="15" result="blur" />
      
      <!-- 4. Color Matrix to create hard liquid edges and dark gray color -->
      <feColorMatrix in="blur" mode="matrix" values="
        0 0 0 0 0.03
        0 0 0 0 0.03
        0 0 0 0 0.05
        0 0 0 50 -20" result="goo" />
        
      <!-- 5. Specular Lighting for metallic gloss -->
      <feSpecularLighting in="blur" surfaceScale="20" specularConstant="1.8" specularExponent="40" lighting-color="#ffffff" result="spec">
        <fePointLight x="430.0" y="-100" z="250" />
      </feSpecularLighting>
      
      <!-- 6. Composite the shine over the dark liquid -->
      <feComposite in="spec" in2="goo" operator="atop" result="shiny_goo" />
    </filter>

    <clipPath id="clip">
      <rect width="860" height="250" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Black Background -->
    <rect width="860" height="250" fill="#000000" />

    <!-- Animated Ferrofluid Blobs -->
    <g filter="url(#ferrofluid)">
      
    <circle cx="200" cy="125" r="70" fill="#fff">
      <animate attributeName="cx" values="50; 350; 50" dur="14s" repeatCount="indefinite" />
      <animate attributeName="cy" values="75; 175; 75" dur="19s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="430" cy="150" r="90" fill="#fff">
      <animate attributeName="cx" values="230; 630; 230" dur="23s" repeatCount="indefinite" />
      <animate attributeName="cy" values="70; 230; 70" dur="17s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="650" cy="100" r="80" fill="#fff">
      <animate attributeName="cx" values="470; 830; 470" dur="18s" repeatCount="indefinite" />
      <animate attributeName="cy" values="40; 160; 40" dur="22s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="150" cy="50" r="50" fill="#fff">
      <animate attributeName="cx" values="50; 250; 50" dur="11s" repeatCount="indefinite" />
      <animate attributeName="cy" values="10; 90; 10" dur="13s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="750" cy="200" r="65" fill="#fff">
      <animate attributeName="cx" values="630; 870; 630" dur="16s" repeatCount="indefinite" />
      <animate attributeName="cy" values="130; 270; 130" dur="21s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="400" cy="50" r="100" fill="#fff">
      <animate attributeName="cx" values="150; 650; 150" dur="27s" repeatCount="indefinite" />
      <animate attributeName="cy" values="20; 80; 20" dur="25s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="550" cy="200" r="75" fill="#fff">
      <animate attributeName="cx" values="400; 700; 400" dur="20s" repeatCount="indefinite" />
      <animate attributeName="cy" values="110; 290; 110" dur="15s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="100" cy="200" r="50" fill="#fff">
      <animate attributeName="cx" values="20; 180; 20" dur="15s" repeatCount="indefinite" />
      <animate attributeName="cy" values="140; 260; 140" dur="18s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="800" cy="50" r="60" fill="#fff">
      <animate attributeName="cx" values="700; 900; 700" dur="19s" repeatCount="indefinite" />
      <animate attributeName="cy" values="0; 100; 0" dur="14s" repeatCount="indefinite" />
    </circle>
    
    </g>

    <!-- Overlay Content -->
    <!-- Pill Badge -->
    <g transform="translate(380.0, 75.0)">
      <rect width="100" height="24" rx="12" fill="#ffffff" opacity="0.1" />
      <rect width="100" height="24" rx="12" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3" />
      <text x="50" y="16" fill="#e4e4e7" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.5">
        PORTFOLIO
      </text>
    </g>

    <!-- Main Title -->
    <text x="430.0" y="135.0" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="46" font-weight="800" text-anchor="middle" letter-spacing="-1">
      Featured Projects
    </text>
    
    <!-- Subtitle -->
    <text x="430.0" y="170.0" fill="#a1a1aa" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="500" text-anchor="middle">
      Explore the systems and architectures I've built
    </text>
  </g>
</svg>
