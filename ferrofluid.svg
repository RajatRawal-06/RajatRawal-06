<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="250" viewBox="0 0 860 250" overflow="hidden">
  <defs>
    <!-- Ferrofluid Wisps Filter (Topographic Band-Pass) -->
    <filter id="ferrofluid" filterUnits="userSpaceOnUse" x="-200" y="-200" width="1260" height="650">
      <!-- 1. Deep fractal noise -->
      <feTurbulence type="fractalNoise" baseFrequency="0.007" numOctaves="3" seed="8" result="noise" />
      
      <!-- 2. Massive displacement for organic tearing shapes -->
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="180" xChannelSelector="R" yChannelSelector="G" result="distorted" />
      
      <!-- 3. Heavy blur to create soft alpha gradients -->
      <feGaussianBlur in="distorted" stdDeviation="28" result="blur" />
      
      <!-- 4. Extract contours using a topographic table map! 
           Creates a bright sharp ring at alpha 0.5, and a faint inner ripple at alpha 0.85 -->
      <feComponentTransfer in="blur" result="wisps">
        <feFuncA type="table" tableValues="0 0 0 0 0 0 0.1 0.6 1 0.6 0.1 0 0 0.15 0.35 0.15 0" />
      </feComponentTransfer>
      
      <!-- 5. Enhance the wisps with shiny silver/white color -->
      <feColorMatrix in="wisps" mode="matrix" values="
        0 0 0 0 0.95
        0 0 0 0 0.95
        0 0 0 0 1.00
        0 0 0 1.2 0" result="colored_wisps" />
        
      <!-- 6. Ambient background glow behind the sharp wisps -->
      <feGaussianBlur in="colored_wisps" stdDeviation="8" result="glow" />
      <feColorMatrix in="glow" mode="matrix" values="
        0 0 0 0 0.7
        0 0 0 0 0.7
        0 0 0 0 0.8
        0 0 0 0.5 0" result="ambient" />
        
      <!-- 7. Combine -->
      <feMerge>
        <feMergeNode in="ambient" />
        <feMergeNode in="colored_wisps" />
      </feMerge>
    </filter>

    <clipPath id="clip">
      <rect width="860" height="250" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Deep Space Background -->
    <rect width="860" height="250" fill="#030303" />

    <!-- Animated Ferrofluid Blobs -->
    <g filter="url(#ferrofluid)">
      
    <circle cx="100" cy="100" r="120" fill="#ffffff">
      <animate attributeName="cx" values="-100; 300; -100" dur="24s" repeatCount="indefinite" />
      <animate attributeName="cy" values="0; 200; 0" dur="29s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="430" cy="50" r="150" fill="#ffffff">
      <animate attributeName="cx" values="130; 730; 130" dur="33s" repeatCount="indefinite" />
      <animate attributeName="cy" values="-30; 130; -30" dur="27s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="750" cy="200" r="130" fill="#ffffff">
      <animate attributeName="cx" values="550; 950; 550" dur="28s" repeatCount="indefinite" />
      <animate attributeName="cy" values="100; 300; 100" dur="32s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="300" cy="250" r="100" fill="#ffffff">
      <animate attributeName="cx" values="150; 450; 150" dur="21s" repeatCount="indefinite" />
      <animate attributeName="cy" values="170; 330; 170" dur="25s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="600" cy="-50" r="140" fill="#ffffff">
      <animate attributeName="cx" values="400; 800; 400" dur="26s" repeatCount="indefinite" />
      <animate attributeName="cy" values="-150; 50; -150" dur="23s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="-50" cy="200" r="110" fill="#ffffff">
      <animate attributeName="cx" values="-200; 100; -200" dur="30s" repeatCount="indefinite" />
      <animate attributeName="cy" values="80; 320; 80" dur="35s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="900" cy="100" r="120" fill="#ffffff">
      <animate attributeName="cx" values="750; 1050; 750" dur="25s" repeatCount="indefinite" />
      <animate attributeName="cy" values="0; 200; 0" dur="20s" repeatCount="indefinite" />
    </circle>
    
    </g>

    <!-- Overlay Content -->
    <g transform="translate(380.0, 75.0)">
      <rect width="100" height="24" rx="12" fill="#ffffff" opacity="0.1" />
      <rect width="100" height="24" rx="12" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3" />
      <text x="50" y="16" fill="#e4e4e7" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.5">
        PORTFOLIO
      </text>
    </g>

    <text x="430.0" y="135.0" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="46" font-weight="800" text-anchor="middle" letter-spacing="-1">
      Featured Projects
    </text>
    
    <text x="430.0" y="170.0" fill="#a1a1aa" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="500" text-anchor="middle">
      Explore the systems and architectures I've built
    </text>
  </g>
</svg>
