<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="300" viewBox="0 0 860 300" overflow="hidden">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>

    <!-- Aurora Wave Gradient -->
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="35%" stop-color="#ec4899"/>
      <stop offset="65%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>

    <!-- Strong Blur -->
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
    </filter>
    
    <!-- Text Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.8"/>
    </filter>

    <clipPath id="clip">
      <rect width="860" height="300" rx="12"/>
    </clipPath>

    <clipPath id="pill-clip">
      <rect x="530" y="131" width="210" height="66" rx="16" />
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Base Background -->
    <rect width="860" height="300" fill="url(#bg)"/>

    <!-- The Aurora Waves -->
    <g filter="url(#blur)">
      <!-- Main thick wave -->
      <path fill="none" stroke="url(#aurora)" stroke-width="90" stroke-linecap="round" opacity="0.8">
        <animate attributeName="d" 
          values="M-100,210.0 Q215.0,60.0 430.0,180.0 T960,120.0;
                  M-100,120.0 Q215.0,240.0 430.0,90.0 T960,210.0;
                  M-100,210.0 Q215.0,60.0 430.0,180.0 T960,120.0" 
          dur="12s" repeatCount="indefinite" />
      </path>
      
      <!-- Secondary overlapping wave -->
      <path fill="none" stroke="url(#aurora)" stroke-width="50" stroke-linecap="round" opacity="0.9">
        <animate attributeName="d" 
          values="M-100,90.0 Q258.0,240.0 516.0,60.0 T960,210.0;
                  M-100,210.0 Q258.0,60.0 516.0,240.0 T960,90.0;
                  M-100,90.0 Q258.0,240.0 516.0,60.0 T960,210.0" 
          dur="17s" repeatCount="indefinite" />
      </path>
    </g>

    <!-- Overlay Content -->
    <!-- Top Pill Badge -->
    <g transform="translate(320.0, 45)">
      <rect width="220" height="28" rx="14" fill="#18181b" opacity="0.75" stroke="#3f3f46" stroke-width="1"/>
      <rect x="4" y="4" width="46" height="20" rx="10" fill="#ffffff"/>
      <text x="27" y="18" fill="#000000" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">NEW</text>
      <text x="130" y="18" fill="#e4e4e7" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" text-anchor="middle">Generative AI Specialization</text>
    </g>

    <!-- Rotating Text Section -->
    <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
      <!-- Static Text -->
      <text x="510" y="178" font-weight="800" font-size="38" fill="#ffffff" letter-spacing="-0.5" text-anchor="end" filter="url(#shadow)">
        Building AI systems that
      </text>
      
      <!-- Pill for Rotating Text -->
      <rect x="530" y="131" width="210" height="66" rx="16" fill="#a855f7" filter="url(#shadow)"/>
      
      <!-- The Rotating Words -->
      <g clip-path="url(#pill-clip)">
        
      <text x="635" y="178" font-weight="800" font-size="38" fill="#ffffff" text-anchor="middle" opacity="0">
        think!
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0.0000;0.0400;0.1600;0.2000;1.0000" dur="15.0s" fill="freeze" repeatCount="indefinite"/>
        <animate attributeName="y" values="220;178;178;140;140" keyTimes="0.0000;0.0400;0.1600;0.2000;1.0000" calcMode="spline" keySplines="0.2 0.8 0.2 1;1 0 0 1;0.8 0 1 1;1 0 0 1" dur="15.0s" fill="freeze" repeatCount="indefinite"/>
      </text>
    
      <text x="635" y="178" font-weight="800" font-size="38" fill="#ffffff" text-anchor="middle" opacity="0">
        learn!
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0.0000;0.2000;0.2400;0.3600;0.4000;1.0000" dur="15.0s" fill="freeze" repeatCount="indefinite"/>
        <animate attributeName="y" values="220;220;178;178;140;140" keyTimes="0.0000;0.2000;0.2400;0.3600;0.4000;1.0000" calcMode="spline" keySplines="1 0 0 1;0.2 0.8 0.2 1;1 0 0 1;0.8 0 1 1;1 0 0 1" dur="15.0s" fill="freeze" repeatCount="indefinite"/>
      </text>
    
      <text x="635" y="178" font-weight="800" font-size="38" fill="#ffffff" text-anchor="middle" opacity="0">
        protect!
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0.0000;0.4000;0.4400;0.5600;0.6000;1.0000" dur="15.0s" fill="freeze" repeatCount="indefinite"/>
        <animate attributeName="y" values="220;220;178;178;140;140" keyTimes="0.0000;0.4000;0.4400;0.5600;0.6000;1.0000" calcMode="spline" keySplines="1 0 0 1;0.2 0.8 0.2 1;1 0 0 1;0.8 0 1 1;1 0 0 1" dur="15.0s" fill="freeze" repeatCount="indefinite"/>
      </text>
    
      <text x="635" y="178" font-weight="800" font-size="38" fill="#ffffff" text-anchor="middle" opacity="0">
        scale!
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0.0000;0.6000;0.6400;0.7600;0.8000;1.0000" dur="15.0s" fill="freeze" repeatCount="indefinite"/>
        <animate attributeName="y" values="220;220;178;178;140;140" keyTimes="0.0000;0.6000;0.6400;0.7600;0.8000;1.0000" calcMode="spline" keySplines="1 0 0 1;0.2 0.8 0.2 1;1 0 0 1;0.8 0 1 1;1 0 0 1" dur="15.0s" fill="freeze" repeatCount="indefinite"/>
      </text>
    
      <text x="635" y="178" font-weight="800" font-size="38" fill="#ffffff" text-anchor="middle" opacity="0">
        innovate!
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0.0000;0.8000;0.8400;0.9600;1.0000" dur="15.0s" fill="freeze" repeatCount="indefinite"/>
        <animate attributeName="y" values="220;220;178;178;140" keyTimes="0.0000;0.8000;0.8400;0.9600;1.0000" calcMode="spline" keySplines="1 0 0 1;0.2 0.8 0.2 1;1 0 0 1;0.8 0 1 1" dur="15.0s" fill="freeze" repeatCount="indefinite"/>
      </text>
    
      </g>
    </g>
  </g>
</svg>
